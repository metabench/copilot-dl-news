<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">V5 Remote Crawler Application Topology</title>
  <desc id="desc">High-level plan showing browser access, remote UI shell, crawl control, article library, bundle jobs, storage, and optional local sync.</desc>
  <rect width="1200" height="760" fill="#111827"/>
  <rect x="30" y="30" width="1140" height="700" rx="22" fill="#0f172a" stroke="#334155" stroke-width="2"/>

  <text x="60" y="75" fill="#f8fafc" font-family="Arial, sans-serif" font-size="28" font-weight="700">V5 Remote Crawler Application</text>
  <text x="60" y="105" fill="#94a3b8" font-family="Arial, sans-serif" font-size="15">Plan: consolidate existing remote crawler, unified shell, article explorer, and export paths into one remotely operated product.</text>

  <rect x="60" y="160" width="220" height="160" rx="18" fill="#1e293b" stroke="#64748b"/>
  <text x="86" y="195" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="22" font-weight="700">Operator</text>
  <text x="86" y="228" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="15">Browser UI</text>
  <text x="86" y="254" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="15">CLI / automation</text>
  <text x="86" y="280" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="15">Bundle download</text>

  <rect x="340" y="130" width="780" height="520" rx="24" fill="#111827" stroke="#475569" stroke-width="2"/>
  <text x="370" y="170" fill="#f8fafc" font-family="Arial, sans-serif" font-size="24" font-weight="700">Remote Host</text>

  <rect x="380" y="210" width="320" height="120" rx="18" fill="#1d4ed8" opacity="0.9"/>
  <text x="405" y="245" fill="#eff6ff" font-family="Arial, sans-serif" font-size="22" font-weight="700">Unified Operator Shell</text>
  <text x="405" y="272" fill="#dbeafe" font-family="Arial, sans-serif" font-size="15">Control Room</text>
  <text x="545" y="272" fill="#dbeafe" font-family="Arial, sans-serif" font-size="15">Article Library</text>
  <text x="405" y="297" fill="#dbeafe" font-family="Arial, sans-serif" font-size="15">Bundle Manager</text>
  <text x="545" y="297" fill="#dbeafe" font-family="Arial, sans-serif" font-size="15">Monitoring</text>

  <rect x="740" y="210" width="340" height="120" rx="18" fill="#0f766e" opacity="0.95"/>
  <text x="765" y="245" fill="#ecfeff" font-family="Arial, sans-serif" font-size="22" font-weight="700">API Gateway</text>
  <text x="765" y="272" fill="#ccfbf1" font-family="Arial, sans-serif" font-size="15">Auth</text>
  <text x="835" y="272" fill="#ccfbf1" font-family="Arial, sans-serif" font-size="15">SSE</text>
  <text x="905" y="272" fill="#ccfbf1" font-family="Arial, sans-serif" font-size="15">Bundle routes</text>
  <text x="765" y="297" fill="#ccfbf1" font-family="Arial, sans-serif" font-size="15">CLI-compatible control APIs</text>

  <rect x="380" y="375" width="220" height="110" rx="18" fill="#7c3aed" opacity="0.95"/>
  <text x="402" y="410" fill="#faf5ff" font-family="Arial, sans-serif" font-size="20" font-weight="700">Crawl Control</text>
  <text x="402" y="437" fill="#ede9fe" font-family="Arial, sans-serif" font-size="15">start / stop / seed</text>
  <text x="402" y="462" fill="#ede9fe" font-family="Arial, sans-serif" font-size="15">profiles / domains / limits</text>

  <rect x="640" y="375" width="220" height="110" rx="18" fill="#b45309" opacity="0.95"/>
  <text x="663" y="410" fill="#fff7ed" font-family="Arial, sans-serif" font-size="20" font-weight="700">Bundle Jobs</text>
  <text x="663" y="437" fill="#ffedd5" font-family="Arial, sans-serif" font-size="15">time-window exports</text>
  <text x="663" y="462" fill="#ffedd5" font-family="Arial, sans-serif" font-size="15">manifest + compressed archive</text>

  <rect x="900" y="375" width="180" height="110" rx="18" fill="#be123c" opacity="0.95"/>
  <text x="923" y="410" fill="#fff1f2" font-family="Arial, sans-serif" font-size="20" font-weight="700">Article Views</text>
  <text x="923" y="437" fill="#ffe4e6" font-family="Arial, sans-serif" font-size="15">list / filter / read</text>
  <text x="923" y="462" fill="#ffe4e6" font-family="Arial, sans-serif" font-size="15">search / inspect</text>

  <rect x="380" y="530" width="280" height="90" rx="18" fill="#334155" stroke="#64748b"/>
  <text x="403" y="565" fill="#f8fafc" font-family="Arial, sans-serif" font-size="20" font-weight="700">Remote Content Store</text>
  <text x="403" y="592" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="15">news.db + content blobs + bundle manifests</text>

  <rect x="720" y="530" width="360" height="90" rx="18" fill="#334155" stroke="#64748b"/>
  <text x="743" y="565" fill="#f8fafc" font-family="Arial, sans-serif" font-size="20" font-weight="700">Crawler Runtime</text>
  <text x="743" y="592" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="15">remote-crawler-v2 engine + workers + scheduling + recovery</text>

  <rect x="60" y="520" width="220" height="120" rx="18" fill="#1e293b" stroke="#64748b"/>
  <text x="86" y="555" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="22" font-weight="700">Optional Local Side</text>
  <text x="86" y="582" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="15">sync to local news.db</text>
  <text x="86" y="607" fill="#cbd5e1" font-family="Arial, sans-serif" font-size="15">offline analysis / backup</text>

  <line x1="280" y1="240" x2="380" y2="240" stroke="#94a3b8" stroke-width="4"/>
  <polygon points="380,240 365,232 365,248" fill="#94a3b8"/>

  <line x1="700" y1="270" x2="740" y2="270" stroke="#93c5fd" stroke-width="4"/>
  <polygon points="740,270 725,262 725,278" fill="#93c5fd"/>

  <line x1="910" y1="330" x2="910" y2="375" stroke="#99f6e4" stroke-width="4"/>
  <polygon points="910,375 902,360 918,360" fill="#99f6e4"/>

  <line x1="490" y1="330" x2="490" y2="375" stroke="#c4b5fd" stroke-width="4"/>
  <polygon points="490,375 482,360 498,360" fill="#c4b5fd"/>

  <line x1="750" y1="330" x2="750" y2="375" stroke="#fed7aa" stroke-width="4"/>
  <polygon points="750,375 742,360 758,360" fill="#fed7aa"/>

  <line x1="990" y1="330" x2="990" y2="375" stroke="#fecdd3" stroke-width="4"/>
  <polygon points="990,375 982,360 998,360" fill="#fecdd3"/>

  <line x1="520" y1="485" x2="520" y2="530" stroke="#94a3b8" stroke-width="4"/>
  <polygon points="520,530 512,515 528,515" fill="#94a3b8"/>

  <line x1="900" y1="485" x2="900" y2="530" stroke="#94a3b8" stroke-width="4"/>
  <polygon points="900,530 892,515 908,515" fill="#94a3b8"/>

  <line x1="660" y1="575" x2="720" y2="575" stroke="#94a3b8" stroke-width="4"/>
  <polygon points="720,575 705,567 705,583" fill="#94a3b8"/>

  <line x1="380" y1="585" x2="280" y2="585" stroke="#94a3b8" stroke-width="4" stroke-dasharray="10 8"/>
  <polygon points="280,585 295,577 295,593" fill="#94a3b8"/>

  <text x="297" y="565" fill="#94a3b8" font-family="Arial, sans-serif" font-size="13">optional sync</text>
  <text x="620" y="690" fill="#94a3b8" font-family="Arial, sans-serif" font-size="14" text-anchor="middle">Key idea: one remote operator-facing application, many reused internal modules.</text>
</svg>
