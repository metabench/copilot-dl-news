<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720" font-family="Segoe UI, sans-serif" font-size="13">
  <rect width="1180" height="720" fill="#0f1419"/>
  <text x="24" y="36" fill="#e6edf3" font-size="20" font-weight="700">Crawl Quality — Module Boundary Plan (audit 2026-05-31)</text>
  <text x="24" y="58" fill="#7d8590" font-size="13">Solid = already implemented &amp; live-wired. Dashed = proposed module to extract/add. Politeness is a hard floor.</text>

  <!-- Existing live modules -->
  <g>
    <rect x="24" y="92" width="250" height="120" rx="8" fill="#161b22" stroke="#2ea043" stroke-width="2"/>
    <text x="40" y="116" fill="#2ea043" font-weight="700">RobotsAndSitemapCoordinator</text>
    <text x="40" y="138" fill="#adbac7">DB-cached robots.txt (24h TTL)</text>
    <text x="40" y="156" fill="#adbac7">isAllowed() allow/deny</text>
    <text x="40" y="174" fill="#adbac7">harvest + enqueue sitemaps</text>
    <text x="40" y="196" fill="#f85149">gap: no Crawl-delay parse/persist</text>
  </g>
  <g>
    <rect x="300" y="92" width="230" height="120" rx="8" fill="#161b22" stroke="#2ea043" stroke-width="2"/>
    <text x="316" y="116" fill="#2ea043" font-weight="700">sitemap.js</text>
    <text x="316" y="138" fill="#adbac7">urlset + sitemapindex</text>
    <text x="316" y="156" fill="#adbac7">surfaces meta.lastmod,</text>
    <text x="316" y="174" fill="#adbac7">changefreq, news:news</text>
    <text x="316" y="196" fill="#f85149">gap: lastmod not prioritized</text>
  </g>
  <g>
    <rect x="556" y="92" width="270" height="120" rx="8" fill="#161b22" stroke="#2ea043" stroke-width="2"/>
    <text x="572" y="116" fill="#2ea043" font-weight="700">FetchPipeline (conditional GET)</text>
    <text x="572" y="138" fill="#adbac7">_buildConditionalHeaders()</text>
    <text x="572" y="156" fill="#adbac7">If-None-Match / If-Modified-Since</text>
    <text x="572" y="174" fill="#adbac7">304 -&gt; not-modified, body null</text>
    <text x="572" y="196" fill="#f85149">gap: ttfb/kbps not decomposed</text>
  </g>
  <g>
    <rect x="852" y="92" width="304" height="120" rx="8" fill="#161b22" stroke="#2ea043" stroke-width="2"/>
    <text x="868" y="116" fill="#2ea043" font-weight="700">RateLimitTracker</text>
    <text x="868" y="138" fill="#adbac7">429/403 backoff + Retry-After</text>
    <text x="868" y="156" fill="#adbac7">success-streak recovery, setInterval()</text>
    <text x="868" y="174" fill="#adbac7">floor = minIntervalMs (100ms)</text>
    <text x="868" y="196" fill="#f85149">gap: no Crawl-delay floor input</text>
  </g>

  <!-- Proposed modules -->
  <g>
    <rect x="24" y="280" width="250" height="120" rx="8" fill="#161b22" stroke="#d29922" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="40" y="304" fill="#d29922" font-weight="700">RobotsCache (extract)</text>
    <text x="40" y="326" fill="#adbac7">typed DB persist: robotsTxt,</text>
    <text x="40" y="344" fill="#adbac7">crawlDelaySeconds, sitemapUrls</text>
    <text x="40" y="362" fill="#adbac7">TTL + conditional revalidate</text>
    <text x="40" y="384" fill="#adbac7">getCrawlDelay(userAgent)</text>
  </g>
  <g>
    <rect x="852" y="280" width="304" height="120" rx="8" fill="#161b22" stroke="#d29922" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="868" y="304" fill="#d29922" font-weight="700">PolitenessGovernor (thin)</text>
    <text x="868" y="326" fill="#adbac7">floor = max(Crawl-delay,</text>
    <text x="868" y="344" fill="#adbac7">  configured, learned interval)</text>
    <text x="868" y="362" fill="#adbac7">feeds RateLimitTracker.setInterval</text>
    <text x="868" y="384" fill="#3fb950">HARD FLOOR — never lowered</text>
  </g>
  <g>
    <rect x="300" y="280" width="290" height="120" rx="8" fill="#161b22" stroke="#d29922" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="316" y="304" fill="#d29922" font-weight="700">FreshnessProbe (surface signal)</text>
    <text x="316" y="326" fill="#adbac7">new vs updated vs unchanged</text>
    <text x="316" y="344" fill="#adbac7">sitemap lastmod + stored etag/LM</text>
    <text x="316" y="362" fill="#adbac7">+ optional HEAD; prioritize fresh</text>
    <text x="316" y="384" fill="#adbac7">enforcement reuses 304 path</text>
  </g>
  <g>
    <rect x="612" y="280" width="214" height="120" rx="8" fill="#161b22" stroke="#d29922" stroke-width="2" stroke-dasharray="6 4"/>
    <text x="628" y="304" fill="#d29922" font-weight="700">ThroughputAnalyzer</text>
    <text x="628" y="326" fill="#adbac7">latency- vs bandwidth-</text>
    <text x="628" y="344" fill="#adbac7">vs politeness-bound</text>
    <text x="628" y="362" fill="#adbac7">adaptive-pacing rec.</text>
    <text x="628" y="384" fill="#adbac7">extends progress-monitor</text>
  </g>

  <!-- arrows -->
  <g stroke="#539bf5" stroke-width="1.5" fill="none" marker-end="url(#a)">
    <path d="M149 212 L149 280"/>
    <path d="M1004 212 L1004 280"/>
    <path d="M445 212 L445 280"/>
    <path d="M691 212 L700 280"/>
  </g>
  <path d="M274 340 L300 340" stroke="#539bf5" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="160" y="252" fill="#539bf5" font-size="11">extract</text>
  <text x="1015" y="252" fill="#539bf5" font-size="11">feed Crawl-delay floor</text>

  <!-- regime legend -->
  <g>
    <rect x="24" y="452" width="1132" height="240" rx="8" fill="#0d1117" stroke="#30363d"/>
    <text x="40" y="478" fill="#e6edf3" font-weight="700" font-size="15">Throughput regime decomposition &amp; adaptive pacing (politeness-safe)</text>
    <text x="40" y="510" fill="#58a6ff" font-weight="700">latency-bound</text>
    <text x="40" y="530" fill="#adbac7">high ttfb, spare bandwidth,</text>
    <text x="40" y="548" fill="#adbac7">low concurrency</text>
    <text x="40" y="572" fill="#3fb950">-&gt; RAISE concurrency / add hosts</text>

    <text x="420" y="510" fill="#58a6ff" font-weight="700">bandwidth-bound</text>
    <text x="420" y="530" fill="#adbac7">bytesPerSec near link ceiling,</text>
    <text x="420" y="548" fill="#adbac7">transferKbps saturated</text>
    <text x="420" y="572" fill="#f0883e">-&gt; HOLD concurrency (no gain)</text>

    <text x="800" y="510" fill="#58a6ff" font-weight="700">politeness-bound</text>
    <text x="800" y="530" fill="#adbac7">Crawl-delay / learned interval</text>
    <text x="800" y="548" fill="#adbac7">dominates wall-clock</text>
    <text x="800" y="572" fill="#f0883e">-&gt; only lever = more DISTINCT hosts</text>

    <text x="40" y="628" fill="#f85149" font-weight="700" font-size="14">INVARIANT: adaptive pacing may only RAISE concurrency or add hosts.</text>
    <text x="40" y="652" fill="#f85149" font-weight="700" font-size="14">It may NEVER lower a per-host politeness floor. Politeness is a hard floor in every regime.</text>
    <text x="40" y="678" fill="#7d8590">Signals: ttfbMs (latency) · transferKbps (bandwidth) · politeness wait ms · concurrency · bytesDownloaded</text>
  </g>

  <defs>
    <marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#539bf5"/>
    </marker>
  </defs>
</svg>
